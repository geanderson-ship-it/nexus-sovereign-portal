<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Treinamento - Em Manutenção</title>
    <style>
        body {
            background-color: #0A0A0B;
            color: #FDFCFE;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            border: 1px solid #27272A;
            border-radius: 0.5rem;
            background-color: #18181B;
        }
        h1 {
            color: #4B5CC4; /* primary */
            font-size: 2.25rem;
            line-height: 2.5rem;
            font-weight: bold;
            letter-spacing: -0.025em;
        }
        p {
            color: #A1A1AA; /* muted-foreground */
            margin-top: 1rem;
            font-size: 1.125rem;
            line-height: 1.75rem;
        }
        .logo-container {
            margin-bottom: 2rem;
        }
        .logo {
            font-weight: bold;
            font-size: 1.5rem;
            color: #4B5CC4;
            letter-spacing: 2px;
        }
        .slogan {
            font-style: italic;
            color: #C99A2E; /* accent */
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo">NEXUS TREINAMENTO</div>
            <div class="slogan">Desvendando talentos.</div>
        </div>
        <h1>Manutenção Programada</h1>
        <p>Estamos realizando melhorias em nosso centro de comando. A conexão será restabelecida em breve.</p>
        <p>Agradecemos a sua paciência, Comandante.</p>
    </div>
</body>
</html>
