version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 20
        - nvm use 20
        - node -v
        - npm install --legacy-peer-deps
        - env | grep -e GMAIL_ -e EVOLUTION_ -e BEDROCK_ -e NEXT_PUBLIC_ -e NEXUS_ -e ZAPI_ -e ELEVENLABS_ -e AZURE_ > .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**
